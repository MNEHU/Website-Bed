# Decap CMS configuratie - Boshuisje Maarsmontagne
# Bepaalt welke teksten en afbeeldingen je in het adminpaneel (/admin) kunt aanpassen.

backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "nl"

collections:
  - name: "content"
    label: "Website inhoud"
    delete: false
    editor:
      preview: false
    files:
      # ---------- STARTSCHERM + INTRO + PRIJZEN + OVER + CONTACT ----------
      - name: "site"
        label: "Algemene teksten & foto's"
        file: "content/site.json"
        fields:
          - { name: "hero_eyebrow", label: "Startscherm - bovenregel", widget: "string" }
          - { name: "hero_title_1", label: "Startscherm - titel regel 1", widget: "string" }
          - { name: "hero_title_2", label: "Startscherm - titel regel 2 (cursief)", widget: "string" }
          - { name: "hero_subtitle", label: "Startscherm - subtitel", widget: "text" }
          - { name: "hero_image", label: "Startscherm - achtergrondfoto", widget: "image", required: false }

          - { name: "intro_label", label: "Introductie - labeltekst", widget: "string" }
          - { name: "intro_title", label: "Introductie - titel", widget: "text", hint: "Gebruik een nieuwe regel voor een regelafbreking." }
          - { name: "intro_text_1", label: "Introductie - alinea 1", widget: "text" }
          - { name: "intro_text_2", label: "Introductie - alinea 2", widget: "text" }
          - { name: "intro_image", label: "Introductie - foto", widget: "image", required: false }

          - name: "specs"
            label: "Specificaties (kenmerken)"
            widget: "list"
            fields:
              - { name: "label", label: "Naam (bv. Capaciteit)", widget: "string" }
              - { name: "value", label: "Waarde (bv. 2-4 personen)", widget: "string" }

          - name: "usps"
            label: "Drie kenmerken (USP's)"
            widget: "list"
            max: 3
            fields:
              - { name: "title", label: "Titel", widget: "string" }
              - { name: "text", label: "Omschrijving", widget: "text" }

          - { name: "story_year", label: "Verhaal - jaartal", widget: "string" }
          - { name: "story_intro", label: "Verhaal - introzin (cursief)", widget: "text" }
          - { name: "story_label", label: "Verhaal - labeltekst", widget: "string" }
          - { name: "story_title_1", label: "Verhaal - titel regel 1", widget: "string" }
          - { name: "story_title_2", label: "Verhaal - titel regel 2 (cursief)", widget: "string" }
          - { name: "story_text_1", label: "Verhaal - alinea 1", widget: "text" }
          - { name: "story_text_2", label: "Verhaal - alinea 2", widget: "text" }
          - { name: "story_text_3", label: "Verhaal - alinea 3", widget: "text" }

          - { name: "experiences_title", label: "Beleef - titel", widget: "string" }
          - { name: "experiences_intro", label: "Beleef - introtekst", widget: "text" }

          - { name: "surroundings_intro", label: "Omgeving - introtekst", widget: "text" }

          - { name: "price_main", label: "Prijs per nacht (weergavetekst)", widget: "string" }
          - { name: "price_extra", label: "Prijs extra persoon (weergavetekst)", widget: "string" }
          - { name: "price_min_nights", label: "Minimaal aantal nachten (weergavetekst)", widget: "string" }

          - { name: "price_per_night", label: "Prijsberekening: per nacht (bedrag, bv. 175)", widget: "number", value_type: "int", min: 0 }
          - { name: "price_extra_person", label: "Prijsberekening: extra persoon per nacht", widget: "number", value_type: "int", min: 0 }
          - { name: "price_hottub", label: "Prijsberekening: hottub-toeslag per verblijf", widget: "number", value_type: "int", min: 0 }
          - { name: "price_cleaning", label: "Prijsberekening: eindschoonmaak per verblijf", widget: "number", value_type: "int", min: 0 }
          - { name: "vat_percent", label: "Btw-percentage (bv. 9)", widget: "number", value_type: "int", min: 0, max: 100 }
          - { name: "min_nights", label: "Minimaal aantal nachten (getal)", widget: "number", value_type: "int", min: 1 }
          - { name: "base_guests", label: "Aantal personen in basisprijs", widget: "number", value_type: "int", min: 1 }

          - name: "amenities"
            label: "Voorzieningen"
            widget: "list"
            fields:
              - { name: "icon", label: "Icoon (emoji)", widget: "string" }
              - { name: "name", label: "Naam", widget: "string" }

          - name: "includes"
            label: "Inclusief-lijst (bij prijzen)"
            widget: "list"
            field: { name: "item", label: "Regel", widget: "string" }

          - name: "photoblock"
            label: "Fotoblok (5 blokken)"
            widget: "list"
            max: 5
            fields:
              - { name: "image", label: "Foto (optioneel; leeg = illustratie)", widget: "image", required: false }
              - { name: "scene", label: "Type illustratie als er geen foto is", widget: "select", required: false, options: ["interior","terrace","forest","fire","lake","heath","house","pyramid"], default: "forest" }

          - { name: "about_text_1", label: "Over ons - alinea 1", widget: "text" }
          - { name: "about_text_2", label: "Over ons - alinea 2", widget: "text" }
          - { name: "about_text_3", label: "Over ons - alinea 3", widget: "text" }
          - { name: "about_signature", label: "Over ons - ondertekening", widget: "string" }
          - { name: "about_image", label: "Over ons - foto eigenaren", widget: "image", required: false }

          - { name: "contact_phone", label: "Telefoonnummer", widget: "string" }
          - { name: "contact_email", label: "E-mailadres", widget: "string" }
          - { name: "contact_whatsapp", label: "WhatsApp-nummer (alleen cijfers, bv. 31612345678)", widget: "string" }
          - { name: "contact_instagram", label: "Instagram gebruikersnaam", widget: "string" }

          - { name: "terms_text", label: "Algemene voorwaarden (leeg = geen link onderaan)", widget: "text", required: false }

      # ---------- BELEEF-KAARTEN ----------
      - name: "experiences"
        label: "Beleef Maarsmontagne (kaarten)"
        file: "content/experiences.json"
        fields:
          - name: "items"
            label: "Belevenissen"
            widget: "list"
            fields:
              - { name: "title", label: "Titel", widget: "string" }
              - { name: "text", label: "Omschrijving", widget: "text" }
              - { name: "badge", label: "Label (bv. Binnenkort)", widget: "string", required: false }
              - { name: "icon", label: "Icoon (emoji, optioneel)", widget: "string", required: false }

      # ---------- REVIEWS ----------
      - name: "reviews"
        label: "Reviews"
        file: "content/reviews.json"
        fields:
          - name: "items"
            label: "Reviews"
            widget: "list"
            max: 5
            fields:
              - { name: "quote", label: "Citaat", widget: "text" }
              - { name: "author", label: "Naam & plaats", widget: "string" }

      # ---------- OMGEVINGSKAARTEN ----------
      - name: "locations"
        label: "Omgeving (kaarten)"
        file: "content/locations.json"
        fields:
          - name: "items"
            label: "Locaties"
            widget: "list"
            fields:
              - { name: "name", label: "Naam", widget: "string" }
              - { name: "desc", label: "Omschrijving", widget: "text" }
              - { name: "distance", label: "Afstand (bv. 8 km)", widget: "string", required: false }
              - { name: "image", label: "Foto (optioneel; leeg = illustratie)", widget: "image", required: false }
              - { name: "scene", label: "Type illustratie als er geen foto is", widget: "select", required: false, options: ["forest","lake","heath","house","pyramid","terrace","fire","interior"], default: "forest" }
