# Decap CMS configuratie — Boshuisje Maarsmontagne
#
# Dit bestand bepaalt WELKE teksten en afbeeldingen je in het adminpaneel kunt aanpassen.
# Je hoeft hier normaal niets aan te veranderen — beheren doe je via /admin op de website.

backend:
  name: git-gateway       # werkt samen met Netlify Identity (zie handleiding)
  branch: main            # de tak in GitHub waar je site staat

# Geüploade foto's komen in deze map terecht
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Taal van het paneel
locale: "nl"

collections:
  - name: "content"
    label: "Website inhoud"
    delete: false
    editor:
      preview: false
    files:
      # ---------- HOMEPAGINA / HERO ----------
      - name: "hero"
        label: "Startscherm (hero)"
        file: "content/site.json"
        fields:
          - { name: "hero_eyebrow", label: "Bovenregel", widget: "string" }
          - { name: "hero_title_1", label: "Titel regel 1", widget: "string" }
          - { name: "hero_title_2", label: "Titel regel 2 (cursief)", widget: "string" }
          - { name: "hero_subtitle", label: "Subtitel", widget: "text" }
          - { name: "hero_image", label: "Achtergrondfoto", widget: "image", required: false }

          # ---------- INTRODUCTIE ----------
          - { name: "intro_title", label: "Introductie — titel", widget: "string" }
          - { name: "intro_text_1", label: "Introductie — alinea 1", widget: "text" }
          - { name: "intro_text_2", label: "Introductie — alinea 2", widget: "text" }
          - { name: "intro_image", label: "Introductie — foto", widget: "image", required: false }

          # ---------- PRIJZEN ----------
          - { name: "price_main", label: "Prijs per nacht (cijfer)", widget: "string" }
          - { name: "price_extra", label: "Prijs extra persoon", widget: "string" }
          - { name: "price_min_nights", label: "Minimaal aantal nachten", widget: "string" }

          # ---------- OVER ONS ----------
          - { name: "about_text_1", label: "Over ons — alinea 1", widget: "text" }
          - { name: "about_text_2", label: "Over ons — alinea 2", widget: "text" }
          - { name: "about_text_3", label: "Over ons — alinea 3", widget: "text" }
          - { name: "about_image", label: "Over ons — foto eigenaren", widget: "image", required: false }

          # ---------- CONTACT ----------
          - { name: "contact_phone", label: "Telefoonnummer", widget: "string" }
          - { name: "contact_email", label: "E-mailadres", widget: "string" }
          - { name: "contact_whatsapp", label: "WhatsApp-nummer (alleen cijfers, bv. 31612345678)", widget: "string" }
          - { name: "contact_instagram", label: "Instagram gebruikersnaam", widget: "string" }

      # ---------- REVIEWS (lijst — toevoegen/verwijderen) ----------
      - name: "reviews"
        label: "Reviews"
        file: "content/reviews.json"
        fields:
          - name: "items"
            label: "Reviews"
            widget: "list"
            max: 5
            fields:
              - { name: "quote", label: "Citaat", widget: "text" }
              - { name: "author", label: "Naam & plaats", widget: "string" }

      # ---------- BELEEF MAARSMONTAGNE (lijst) ----------
      - name: "experiences"
        label: "Beleef Maarsmontagne (kaarten)"
        file: "content/experiences.json"
        fields:
          - name: "items"
            label: "Belevenissen"
            widget: "list"
            fields:
              - { name: "title", label: "Titel", widget: "string" }
              - { name: "text", label: "Omschrijving", widget: "text" }
              - { name: "badge", label: "Label (bv. Binnenkort)", widget: "string", required: false }
